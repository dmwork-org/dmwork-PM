name: 🐛 Bug / 待确认问题
description: 提交一个可能的 Bug 或不确定的问题
labels: ["bug", "needs-analysis"]
body:
  - type: markdown
    attributes:
      value: |
        如果是明确的 Bug（报错/崩溃/UI异常），请直接提到对应研发仓库。
        如果拿不准，先提到这里，aoli 来判断。
  - type: input
    id: source
    attributes:
      label: 反馈来源
      placeholder: "张三在 DMWork 群反馈 / 测试发现"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 发生了什么？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何触发这个问题？
      placeholder: |
        1. 打开 xxx
        2. 点击 xxx
        3. 出现 xxx
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 截图、日志、环境信息等
    validations:
      required: false
